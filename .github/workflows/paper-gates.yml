name: Paper Gates

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  paper-gates:
    name: Paper gates and safety scans
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[research,dev]"

      - name: Run release gates
        run: ./scripts/verify-release.sh

      - name: Verify latest model is unchanged
        run: git diff --exit-code -- models/latest_model.json

      - name: Scan for live trading authorization
        run: |
          live_auth="live_trading_authorized"
          live_allowed="live_trading_allowed"
          if grep -R -n -E "(${live_auth}|${live_allowed})([[:space:]]*[:=][[:space:]]*true)" src configs scripts docs README.md .github --exclude-dir=.git --exclude-dir=.venv --exclude-dir=reports/tmp; then
            echo "live trading authorization string found"
            exit 1
          fi

      - name: Scan for futures execution commands
        run: |
          if grep -R -n -E 'subparsers\.add_parser\("futures-(execute|submit)"' src tests; then
            echo "futures execution parser found"
            exit 1
          fi
