name: Paper Gates

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  paper-gates:
    name: Paper gates and safety scans
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[research,dev]"

      - name: Run release gates
        run: ./scripts/verify-release.sh

      - name: Verify latest model is unchanged
        run: git diff --exit-code -- models/latest_model.json

      - name: Scan for live trading authorization and futures execution parser
        run: |
          python3 scripts/verify-safety-patterns.py --mode live
          python3 scripts/verify-safety-patterns.py --mode futures
